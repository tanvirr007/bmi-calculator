<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium, responsive BMI calculator to track your health.">
    <title>BMI Calculator | Premium Health Tool</title>
    <link rel="icon" type="image/png" href="./assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/style.css?v=1.1">
</head>

<body>
    <main class="container">
        <div class="theme-toggle-container">
            <button id="toggleDarkMode" aria-label="Toggle Dark Mode" title="Switch Theme">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="theme-icon">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                </svg>
            </button>
        </div>

        <header>
            <h2>BMI Calculator</h2>
        </header>

        <section class="calculator-form">
            <div class="input-group">
                <label for="weight">Weight</label>
                <input type="number" id="weight" placeholder="e.g. 70 kg" min="1" max="500" step="0.1">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="feet">Height</label>
                    <input type="number" id="feet" placeholder="5 ft" min="0" max="8">
                </div>
                <div class="input-group">
                    <label for="inches">Inches</label>
                    <input type="number" id="inches" placeholder="10" min="0" max="11">
                </div>
            </div>

            <div id="result" aria-live="polite"></div>

            <div class="button-stack">
                <button id="resetButton" class="btn-secondary" style="display: none;">Reset</button>
                <button id="calculateBtn" class="btn-primary">Calculate BMI</button>
                <button id="downloadBtn" class="btn-secondary" style="display: none;">Download Report</button>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="./assets/script.js?v=1.1"></script>
</body>

</html>
