<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
    <div class="container">
        <h2>BMI Calculator</h2>

        <div class="input-group">
            <label><b>Weight:</b></label>
            <input type="number" id="weight" placeholder="Enter weight in kg">
        </div>

        <div class="input-group">
            <label><b>Height:</b></label>
            <input type="number" id="feet" placeholder="Feet">
        </div>

        <div class="input-group">
            <label><b>Height:</b></label>
            <input type="number" id="inches" placeholder="Inches" max="11">
        </div>

        <button onclick="calculateBMI()">Calculate BMI</button>

        <div id="result" style="display: none;"></div>

        <div class="toggle-container">
            <label class="switch">
                <input type="checkbox" id="toggleDarkMode" onclick="toggleDarkMode()">
                <span class="slider"></span>
            </label>
        </div>
        <button id="resetButton" onclick="resetForm()">Reset</button>
    </div>

    <script src="./assets/script.js"></script>
</body>
</html>
